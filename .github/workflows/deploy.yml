name: MERN Next.js CI/CD
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Login to Docker Hub
    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 3. Build backend image
    - name: Build backend image
      run: docker build -t shuaib777sas/backend:latest ./backend

    # 4. Build frontend image
    - name: Build frontend image
      run: |
        docker build \
          --build-arg NEXT_PUBLIC_API_URL=http://${{ secrets.EC2_HOST }}:5000/api \
          -t shuaib777sas/frontend:latest ./frontend

    # 5. Push images
    - name: Push images
      run: |
        docker push shuaib777sas/backend:latest
        docker push shuaib777sas/frontend:latest
